<div class="modal" id="danger-modal" style="display: none;">
    <div class="modal-content danger">
        <span class="close-modal-btn" data-modal-id="danger-modal">&times;</span>
        <h3><i class="fas fa-exclamation-triangle"></i> Confirmation Requise</h3>
        <p id="danger-modal-text">Le message de confirmation va ici.</p>
        <form id="danger-modal-form" action="" method="POST" class="modal-form">
            <div class="form-actions">
                <button type="button" class="btn btn-secondary close-modal-btn" data-modal-id="danger-modal">Annuler</button>
                <button type="submit" id="danger-modal-confirm-btn" class="btn btn-danger">Confirmer</button>
            </div>
        </form>
    </div>
</div>
